<html>
    <head>
        <link rel="stylesheet" href="/css/style.css">
        <title>Edit Password</title>
    </head>
    <body>
        <div id="edit-password-window-container">
            <div id="edit-password-main-container">
                <div id="edit-password-top-container">
                    <label>Edit password</label>
                </div>
                <div id="edit-password-middle-container">
                    <div>
                        <label>Current password</label>
                        <input type="password" id="edit-password-current-password">
                    </div>
                    <div>
                        <label>New password</label>
                        <input type="password" id="edit-password-new-password">
                    </div>
                    <div>
                        <label>Confirm password</label>
                        <input type="password" id="edit-password-confirm-password">
                    </div>
                </div>
                <div id="edit-password-bottom-container">
                    <button onclick="backOnClick()" id="password-edit-cancel-button">Back</button>
                    <button onclick="saveChangesOnClick()" id="password-edit-save-button">Save Changes</button>
                </div>
                <div id="edit-password-message-container">
                    <p id="edit-password-message-nok" class="message">
                        Please complete all fields.
                    </p>
                    <p id="edit-password-message-ok" class="message">
                        Your password has been changed successfully.
                    </p>
                </div>
            </div>
        </div>

        <script src="/js/user-profile/edit-password.js"></script>
    </body>
</html>
